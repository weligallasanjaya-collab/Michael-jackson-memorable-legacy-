<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Memorables | Bluepanda AI Sovereign</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* UPDATED to match your GitHub file name exactly */
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), 
                        url('HD-wallpaper-michael-jacksons-moonwalk-michael-jackson.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header { margin-top: 25px; text-align: center; }
        
        .sig-container {
            width: 280px;
            height: 100px;
            /* UPDATED to match your GitHub file name exactly */
            background: url('163-1633476_michael-jackson-signature-png-transparent-michael-jackson.png') no-repeat center;
            background-size: contain;
            filter: invert(1);
            margin: 0 auto;
        }

        .brand { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; letter-spacing: 2px; opacity: 0.8; margin-top: 10px; }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 30px;
            width: 85%;
            max-width: 550px;
            text-align: center;
            margin-top: 40px;
        }

        .dashboard {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 15px;
            width: 95%;
            justify-content: center;
            align-items: flex-end;
        }

        .dash-panel {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            padding: 15px;
        }

        .vid-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        .player-panel {
            width: 320px;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 12px 25px;
        }

        .play-btn {
            width: 45px;
            height: 45px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.3rem;
        }

        .track-info { flex-grow: 1; }
        .track-name { font-size: 0.95rem; font-weight: bold; }

        .guest-panel { width: 300px; text-align: left; }
        .input-box {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px; padding: 10px; color: white; font-size: 0.8rem; margin-top: 8px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="sig-container"></div>
        <div class="brand">PRODUCED BY BLUEPANDA AI WEB COMPANY</div>
    </div>

    <div class="main-card">
        <p style="font-size: 0.9rem; line-height: 1.6;">Celebrating the King of Pop. Use the master player below to cycle through the greatest hits of a generation.</p>
        <button style="background:white; color:black; border:none; padding:12px 25px; border-radius:50px; cursor:pointer; font-family:'Orbitron'; font-weight:bold; font-size: 0.75rem;" onclick="nextTrack()">NEXT LEGACY TRACK ❯</button>
    </div>

    <div class="dashboard">
        <div class="dash-panel">
            <div class="vid-circle"><div id="player"></div></div>
        </div>

        <div class="dash-panel player-panel">
            <div class="play-btn" id="masterPlay">▶</div>
            <div class="track-info">
                <div class="track-name" id="currentTrackName">Billie Jean</div>
                <div style="font-size: 0.6rem; opacity: 0.5;">LIVE STREAM ACTIVE</div>
            </div>
            <div style="font-size: 1.2rem; opacity: 0.6;">🔊</div>
        </div>

        <div class="dash-panel guest-panel">
            <div style="font-weight: bold; font-size: 0.9rem;">Guestbook</div>
            <div class="input-box">Leave a message...</div>
        </div>
    </div>

    <script>
        const playlist = [
            { id: 'Zi_XLOBDo_Y', name: 'Billie Jean' },
            { id: 'QNJL6nfu__Q', name: 'They Don\'t Care About Us' },
            { id: 'dsUXAEzaC3Q', name: 'Smooth Criminal' }
        ];
        
        let currentTrack = 0;
        let ytPlayer;

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%', width: '100%',
                videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1, 'rel': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('masterPlay');
            btn.innerHTML = (event.data == YT.PlayerState.PLAYING) ? "⏸" : "▶";
            if (event.data == YT.PlayerState.ENDED) nextTrack();
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            ytPlayer.loadVideoById(playlist[currentTrack].id);
            document.getElementById('currentTrackName').innerText = playlist[currentTrack].name;
        }

        document.getElementById('masterPlay').addEventListener('click', () => {
            if (ytPlayer.getPlayerState() == YT.PlayerState.PLAYING) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        });
    </script>
</body>
</html>
