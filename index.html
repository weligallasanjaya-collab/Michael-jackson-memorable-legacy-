<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michael Jackson Memorables | Bluepanda AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* IMAGE 0 INTEGRATION: Watercolor MJ Background */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://i.ibb.co/mF9mZ3R/1000093401.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            margin-top: 50px;
            text-align: center;
            width: 100%;
        }

        /* IMAGE 1 INTEGRATION: MJ Signature Title */
        .signature-title {
            width: 350px;
            max-width: 80%;
            filter: invert(1); /* Makes the black signature white for the dark background */
            margin-bottom: 0;
        }

        .company-tag {
            font-family: 'Orbitron', sans-serif;
            color: #00d4ff;
            letter-spacing: 3px;
            font-size: 0.9rem;
            margin-top: -10px;
        }

        .category-title {
            width: 85%;
            border-left: 5px solid #00d4ff;
            padding-left: 15px;
            font-size: 1.8rem;
            margin-top: 60px;
            font-weight: bold;
        }

        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            width: 90%;
            max-width: 1300px;
            margin: 30px 0;
        }

        /* Gemini Glowing Video Box */
        .video-box {
            position: relative;
            padding: 5px;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            overflow: hidden;
        }

        .video-box::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 15px;
            padding: 2px;
            background: linear-gradient(90deg, transparent, #fff, transparent, #fff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            background-size: 200% 100%;
            animation: moveLine 4s linear infinite;
        }

        @keyframes moveLine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            border: none;
            display: block;
        }

        .message-section {
            width: 90%;
            max-width: 650px;
            background: rgba(255,255,255,0.07);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(15px);
            margin: 80px 0;
            text-align: center;
        }

        .btn-main {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px 45px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div class="header-container">
        <img src="https://i.ibb.co/6NB08bX/1000093403.jpg" alt="Michael Jackson" class="signature-title">
        <div class="company-tag">Produced by Bluepanda AI Web Company</div>
        <button onclick="startExperience()" id="playBtn" class="btn-main" style="margin-top: 20px;">Enter Legacy</button>
    </div>

    <h2 class="category-title">Music Collection</h2>
    <div class="video-grid">
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/QNJL6nfu__Q?enablejsapi=1"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/oRdxUFDoQe0?enablejsapi=1"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/dsUXAEzaC3Q?enablejsapi=1"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/XAi3VTSdTxU?enablejsapi=1"></iframe></div>
    </div>

    <h2 class="category-title">Funny & Rare Moments</h2>
    <div class="video-grid">
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/lcC9BPk8hrw?enablejsapi=1"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/ays4kjgYA0E?enablejsapi=1"></iframe></div>
    </div>

    <div class="message-section">
        <h3>Bluepanda AI Guestbook</h3>
        <textarea id="userInput" style="width:100%; height:100px; border-radius:10px; padding:10px; margin-bottom:15px; color:black;" placeholder="Share your tribute..."></textarea>
        <button onclick="postMessage()" class="btn-main" style="padding: 10px 25px; font-size: 0.8rem;">Post Message</button>
        <div id="feed" style="margin-top: 25px; text-align: left;"></div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const videos = document.querySelectorAll('.mj-video');

        function startExperience() {
            audio.volume = 0.15;
            audio.play();
            document.getElementById('playBtn').style.display = 'none';
        }

        // YouTube API to Stop Background Music when Video Plays
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            videos.forEach((video) => {
                new YT.Player(video, {
                    events: {
                        'onStateChange': function(event) {
                            if (event.data == YT.PlayerState.PLAYING) {
                                audio.pause();
                            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                                audio.play();
                            }
                        }
                    }
                });
            });
        }

        function postMessage() {
            const msg = document.getElementById('userInput').value;
            const blacklist = ["stupid", "bad", "hate", "fake"]; 
            if (blacklist.some(word => msg.toLowerCase().includes(word))) {
                alert("Bluepanda AI Intelligence: Please keep it respectful.");
            } else if (msg.length > 5) {
                const p = document.createElement('p');
                p.innerHTML = `<strong>Tribute:</strong> ${msg}`;
                document.getElementById('feed').prepend(p);
                document.getElementById('userInput').value = "";
            }
        }
    </script>
</body>
</html>
