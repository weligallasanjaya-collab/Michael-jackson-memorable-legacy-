<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Memorables | Bluepanda AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Orbitron:wght@500&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* Using a high-quality MJ Silhouette backdrop */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://wallpaperaccess.com/full/1505325.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Movie Style Title */
        h1 {
            font-family: 'Cinzel', serif; /* Classic Movie look */
            font-size: 3.5rem;
            margin-bottom: 0;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .company-tag {
            font-family: 'Orbitron', sans-serif;
            color: #00d4ff;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        /* Gemini Glowing Video Box */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 40px;
            width: 90%;
            max-width: 1200px;
            margin: 40px 0;
        }

        .video-box {
            position: relative;
            padding: 10px;
            background: rgba(0,0,0,0.9);
            border-radius: 15px;
            overflow: hidden;
        }

        /* Gemini Animated Lines for Boxes */
        .video-box::after {
            content: "";
            position: absolute;
            inset: 0;
            border-radius: 15px;
            padding: 3px;
            background: linear-gradient(90deg, transparent, #fff, transparent, #fff);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            background-size: 200% 100%;
            animation: moveLine 3s linear infinite;
        }

        @keyframes moveLine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .video-box iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 10px;
            border: none;
        }

        .category-title {
            width: 100%;
            text-align: left;
            margin-left: 10%;
            border-left: 5px solid #00d4ff;
            padding-left: 15px;
            font-size: 1.5rem;
            margin-top: 40px;
        }

        .message-section {
            width: 90%;
            max-width: 600px;
            background: rgba(255,255,255,0.05);
            padding: 30px;
            border-radius: 24px;
            backdrop-filter: blur(15px);
            margin: 50px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        button {
            background: white;
            color: black;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3" type="audio/mpeg">
    </audio>

    <div style="text-align:center; margin-top: 100px;">
        <h1>Michael Jackson</h1>
        <div class="company-tag">Produced by Bluepanda AI</div>
        <button onclick="startExperience()" id="playBtn">ENTER THE LEGACY</button>
    </div>

    <h2 class="category-title">Music Masterpieces</h2>
    <div class="video-grid">
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/sOnqjkM8Gu0?enablejsapi=1" allow="autoplay"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/Zi_XLOBDo_Y?enablejsapi=1"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/4V90Q7L2228?enablejsapi=1"></iframe></div>
    </div>

    <h2 class="category-title">Funny & Rare Moments</h2>
    <div class="video-grid">
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/rV9uN673S_I?enablejsapi=1"></iframe></div>
        <div class="video-box"><iframe class="mj-video" src="https://www.youtube.com/embed/3_p09T89S6k?enablejsapi=1"></iframe></div>
    </div>

    <div class="message-section">
        <h3>Bluepanda AI Guarded Guestbook</h3>
        <textarea id="userInput" style="width:100%; height:100px; border-radius:10px; padding:10px; margin-bottom:10px;" placeholder="Leave your tribute..."></textarea>
        <button onclick="postMessage()">Send Message</button>
        <div id="feed"></div>
    </div>

    <script>
        const audio = document.getElementById('bgMusic');
        const videos = document.querySelectorAll('.mj-video');

        function startExperience() {
            audio.volume = 0.15;
            audio.play();
            document.getElementById('playBtn').style.display = 'none';
        }

        // Smart Audio Logic: Stop Billie Jean when Video Plays
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            videos.forEach((video, index) => {
                new YT.Player(video, {
                    events: {
                        'onStateChange': function(event) {
                            if (event.data == YT.PlayerState.PLAYING) {
                                audio.pause();
                            } else if (event.data == YT.PlayerState.PAUSED || event.data == YT.PlayerState.ENDED) {
                                audio.play();
                            }
                        }
                    }
                });
            });
        }

        function postMessage() {
            const msg = document.getElementById('userInput').value;
            const blacklist = ["stupid", "bad", "hate"]; 
            if (blacklist.some(word => msg.toLowerCase().includes(word))) {
                alert("Bluepanda AI: Stay respectful!");
            } else {
                const p = document.createElement('p');
                p.textContent = "Tribute: " + msg;
                document.getElementById('feed').prepend(p);
            }
        }
    </script>
</body>
</html>
