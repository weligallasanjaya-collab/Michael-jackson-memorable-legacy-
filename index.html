<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MJ Memorables | Bluepanda AI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            /* FIXED: Matches your actual background filename */
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('1000093401.jpg') no-repeat center center fixed;
            background-size: cover;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }

        .header { margin-top: 20px; text-align: center; }
        
        /* FIXED: Matches your actual signature filename */
        .sig-img { 
            width: 250px; 
            filter: invert(1); 
            content: url('1000093403.jpg'); 
        }

        .brand { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.7; }

        .main-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 25px;
            width: 85%;
            max-width: 500px;
            text-align: center;
            margin-top: 20px;
        }

        /* Dashboard Section */
        .dashboard {
            position: absolute;
            bottom: 30px;
            display: flex;
            gap: 15px;
            width: 95%;
            justify-content: center;
            align-items: flex-end;
        }

        .dash-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(15px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
        }

        /* Circular Video Preview */
        .vid-circle {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0,212,255,0.5);
        }

        /* Music Control Panel (The one you circled) */
        .player-panel {
            width: 300px;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
        }

        .play-btn {
            width: 45px;
            height: 45px;
            background: white;
            color: black;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .track-info { flex-grow: 1; }
        .track-name { font-size: 0.9rem; font-weight: bold; }
        .progress-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.2);
            margin-top: 8px; border-radius: 2px;
        }
        .progress-fill { width: 60%; height: 100%; background: white; border-radius: 2px; }

        .guest-panel { width: 280px; }
        .input-box {
            width: 100%; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px; padding: 8px; color: white; font-size: 0.8rem; margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="sig-img"></div>
        <div class="brand">PRODUCED BY BLUEPANDA AI WEB COMPANY</div>
    </div>

    <div class="main-card">
        <p style="font-size: 0.85rem;">Celebrating the King of Pop. Use the master player below to cycle through the greatest hits.</p>
        <button style="background:white; color:black; border:none; padding:8px 20px; border-radius:20px; cursor:pointer; font-family:'Orbitron'; font-size:0.7rem; font-weight:bold;" onclick="nextTrack()">NEXT LEGACY TRACK ❯</button>
    </div>

    <div class="dashboard">
        <div class="dash-panel">
            <div class="vid-circle"><div id="player"></div></div>
        </div>

        <div class="dash-panel player-panel">
            <div class="play-btn" id="masterPlay">▶</div>
            <div class="track-info">
                <div class="track-name" id="currentTrackName">Billie Jean</div>
                <div class="progress-bar"><div class="progress-fill"></div></div>
            </div>
            <div style="opacity: 0.5;">🔊</div>
        </div>

        <div class="dash-panel guest-panel">
            <div style="font-weight: bold; font-size: 0.8rem;">Guestbook</div>
            <div class="input-box">Leave a message...</div>
        </div>
    </div>

    <script>
        const playlist = [
            { id: 'Zi_XLOBDo_Y', name: 'Billie Jean' },
            { id: 'QNJL6nfu__Q', name: 'They Don\'t Care About Us' },
            { id: 'dsUXAEzaC3Q', name: 'Smooth Criminal' }
        ];
        
        let currentTrack = 0;
        let ytPlayer;

        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('player', {
                height: '100%', width: '100%',
                videoId: playlist[currentTrack].id,
                playerVars: { 'autoplay': 0, 'controls': 0, 'modestbranding': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            const btn = document.getElementById('masterPlay');
            btn.innerHTML = (event.data == YT.PlayerState.PLAYING) ? "⏸" : "▶";
            if (event.data == YT.PlayerState.ENDED) nextTrack();
        }

        function nextTrack() {
            currentTrack = (currentTrack + 1) % playlist.length;
            ytPlayer.loadVideoById(playlist[currentTrack].id);
            document.getElementById('currentTrackName').innerText = playlist[currentTrack].name;
        }

        document.getElementById('masterPlay').addEventListener('click', () => {
            if (ytPlayer.getPlayerState() == YT.PlayerState.PLAYING) {
                ytPlayer.pauseVideo();
            } else {
                ytPlayer.playVideo();
            }
        });
    </script>
</body>
</html>
